<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a259ff"/>
      <stop offset="50%" style="stop-color:#f8a5c2"/>
      <stop offset="100%" style="stop-color:#58d68d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- D + S monogram with gradient stroke -->
  <g transform="translate(256,256)" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- D arc -->
    <path d="M-60,-100 L-60,100 C-60,100 80,100 80,0 C80,-100 -60,-100 -60,-100"/>
    <!-- S wave -->
    <path d="M-20,-60 C40,-60 40,-10 0,-10 C-40,-10 -40,40 20,60" stroke-width="24"/>
    <!-- Connection dot top -->
    <circle cx="-60" cy="-100" r="10" fill="#a259ff" stroke="none"/>
    <!-- Connection dot bottom -->
    <circle cx="-60" cy="100" r="10" fill="#58d68d" stroke="none"/>
  </g>
</svg>
